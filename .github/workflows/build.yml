name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ssh-key-manager-linux
            binary_ext: ""
          - os: windows-latest
            artifact_name: ssh-key-manager-windows
            binary_ext: .exe
          - os: macos-latest
            artifact_name: ssh-key-manager-macos
            binary_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --console --name ${{ matrix.artifact_name }} \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import modules \
            --hidden-import modules.server \
            --hidden-import modules.key_generator \
            --hidden-import modules.key_uploader \
            --hidden-import modules.ssh_config \
            --hidden-import modules.utils \
            --hidden-import modules.connections_store \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.binary_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "current=$VER" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.version.outputs.current }}"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new }}" > VERSION

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new }}" || true
          git push || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/ssh-key-manager-linux/ssh-key-manager-linux release/
          cp artifacts/ssh-key-manager-windows/ssh-key-manager-windows.exe release/
          cp artifacts/ssh-key-manager-macos/ssh-key-manager-macos release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          body: |
            ## 🚀 SSH Key Manager v${{ steps.bump.outputs.new }}

            自动构建于 `${{ github.sha }}`

            ### 下载
            | 平台 | 文件 |
            |---|---|
            | 🐧 Linux | `ssh-key-manager-linux` |
            | 🪟 Windows | `ssh-key-manager-windows.exe` |
            | 🍎 macOS | `ssh-key-manager-macos` |

            ### 使用
            ```bash
            # macOS / Linux
            chmod +x ssh-key-manager-*
            ./ssh-key-manager-*
            ```
            ```cmd
            REM Windows
            ssh-key-manager-windows.exe
            ```
          files: |
            release/ssh-key-manager-linux
            release/ssh-key-manager-windows.exe
            release/ssh-key-manager-macos
          draft: false
          prerelease: false
