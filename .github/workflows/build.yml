name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'
      - '**.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller (single file)
        shell: bash
        run: |
          pyinstaller main.spec

      - name: Verify build output
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -la dist/
          EXPECTED="ssh-key-manager-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EXPECTED="${EXPECTED}.exe"
          fi
          if [ -f "dist/${EXPECTED}" ]; then
            echo "✅ Single file build succeeded: dist/${EXPECTED}"
            file dist/${EXPECTED} || true
          else
            echo "❌ Expected file not found: dist/${EXPECTED}"
            echo "=== full dist listing ==="
            find dist/ -type f | head -50
            exit 1
          fi

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key-manager-${{ matrix.platform }}
          path: dist/ssh-key-manager-${{ matrix.platform }}${{ matrix.platform == 'windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        shell: bash
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "current=$VER" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.version.outputs.current }}"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        shell: bash
        run: echo "${{ steps.bump.outputs.new }}" > VERSION

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new }} [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed, may already be pushed"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          VER="v${{ steps.bump.outputs.new }}"

          # Windows: single .exe → zip
          WIN_EXE="artifacts/ssh-key-manager-windows/ssh-key-manager-windows.exe"
          if [ -f "$WIN_EXE" ]; then
            zip -j "release/ssh-key-manager-windows-${VER}.zip" "$WIN_EXE"
            echo "✅ Windows asset prepared"
          else
            echo "❌ Windows exe not found at $WIN_EXE"
            find artifacts/ -type f | head -20
          fi

          # Linux: single binary → zip
          LIN_BIN="artifacts/ssh-key-manager-linux/ssh-key-manager-linux"
          if [ -f "$LIN_BIN" ]; then
            chmod +x "$LIN_BIN"
            zip -j "release/ssh-key-manager-linux-${VER}.zip" "$LIN_BIN"
            echo "✅ Linux asset prepared"
          else
            echo "❌ Linux binary not found at $LIN_BIN"
            find artifacts/ -type f | head -20
          fi

          # macOS: single binary → zip
          MAC_BIN="artifacts/ssh-key-manager-macos/ssh-key-manager-macos"
          if [ -f "$MAC_BIN" ]; then
            chmod +x "$MAC_BIN"
            zip -j "release/ssh-key-manager-macos-${VER}.zip" "$MAC_BIN"
            echo "✅ macOS asset prepared"
          else
            echo "❌ macOS binary not found at $MAC_BIN"
            find artifacts/ -type f | head -20
          fi

          echo "=== release assets ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          body: |
            ## 🚀 SSH Key Manager v${{ steps.bump.outputs.new }}

            > 自动构建于 `${{ github.sha }}`

            ### 下载
            | 平台 | 文件 |
            |---|---|
            | 🐧 Linux | `ssh-key-manager-linux-v${{ steps.bump.outputs.new }}.zip` |
            | 🪟 Windows | `ssh-key-manager-windows-v${{ steps.bump.outputs.new }}.zip` |
            | 🍎 macOS | `ssh-key-manager-macos-v${{ steps.bump.outputs.new }}.zip` |

            ### 使用
            ```bash
            # 解压对应平台的 zip，运行可执行文件
            # Windows: 解压后双击 ssh-key-manager-windows.exe
            # Linux/macOS: chmod +x ssh-key-manager-* && ./ssh-key-manager-*
            ```
          files: release/*.zip
          draft: false
          prerelease: false
