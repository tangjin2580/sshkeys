name: Build Windows Release

# 只在 push 到 main 时触发，版本 bump 提交跳过 CI
on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'
      - '**.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install pystray Pillow

      - name: Build with PyInstaller (main.spec)
        run: pyinstaller main.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSHKeyManager-windows
          path: dist/SSHKeyManager/**

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        shell: bash
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "current=$VER" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.version.outputs.current }}"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        shell: bash
        run: echo "${{ steps.bump.outputs.new }}" > VERSION

      - name: Commit version bump (skip CI)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new }} [skip ci]" || true
          git push || true

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SSHKeyManager-windows
          path: dist/SSHKeyManager

      - name: Zip release asset
        shell: bash
        run: |
          cd dist
          zip -r ../SSHKeyManager-v${{ steps.bump.outputs.new }}-windows.zip SSHKeyManager/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          body: |
            ## 🚀 SSH Key Manager v${{ steps.bump.outputs.new }}

            > 自动构建于 `${{ github.sha }}`

            ### 下载
            - **Windows**：下载 `SSHKeyManager-v${{ steps.bump.outputs.new }}-windows.zip`，解压后运行 `SSHKeyManager.exe`

            ### 安装依赖（打包环境）
            ```
            pip install flask waitress paramiko cryptography requests pystray Pillow
            ```

            ### 更新日志
            详见 [Commits](https://github.com/${{ github.repository }}/commits/main)
          files: |
            SSHKeyManager-v${{ steps.bump.outputs.new }}-windows.zip
          draft: false
          prerelease: false
