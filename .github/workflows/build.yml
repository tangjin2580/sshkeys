name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'
      - '**.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (macOS — use Homebrew for Tk 9.0)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          # GitHub Actions 自带 Python 3.13 (Tk 8.6)，在 macOS 14+ 会崩溃
          # 改用 Homebrew 的 python-tk@3.13（绑定 Tk 9.0）
          brew install python-tk@3.13 || brew upgrade python-tk@3.13
          # 创建 shim 目录，让 python/pip 指向 Homebrew 版本
          SHIM="$RUNNER_TEMP/py-shim"
          mkdir -p "$SHIM"
          BREW_PY="$(brew --prefix python@3.13)/bin"
          ln -sf "$BREW_PY/python3.13" "$SHIM/python"
          ln -sf "$BREW_PY/python3.13" "$SHIM/python3"
          ln -sf "$BREW_PY/pip3.13"     "$SHIM/pip"
          ln -sf "$BREW_PY/pip3.13"     "$SHIM/pip3"
          echo "$SHIM" >> $GITHUB_PATH
          # 验证
          python --version
          python -c "import tkinter; print('Tk', tkinter.TkVersion)"

      - name: Setup Python (non-macOS)
        if: matrix.platform != 'macos'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          pip install pyobjc-framework-Cocoa

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller main.spec

      - name: Package macOS .app as zip
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          cd dist
          if [ -d "SSH Key Manager.app" ]; then
            echo "✅ .app Bundle 已生成"
            zip -r "ssh-key-manager-macos.zip" "SSH Key Manager.app"
            echo "✅ 已打包为 ssh-key-manager-macos.zip"
          else
            echo "❌ .app Bundle 未找到"
            ls -la
            exit 1
          fi

      - name: Verify build output
        if: matrix.platform != 'macos'
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -la dist/
          EXPECTED="ssh-key-manager-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EXPECTED="${EXPECTED}.exe"
          fi
          if [ -f "dist/${EXPECTED}" ]; then
            echo "✅ Single file build succeeded: dist/${EXPECTED}"
            file dist/${EXPECTED} || true
          else
            echo "❌ Expected file not found: dist/${EXPECTED}"
            echo "=== full dist listing ==="
            find dist/ -type f | head -50
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key-manager-${{ matrix.platform }}
          path: |
            dist/ssh-key-manager-${{ matrix.platform }}${{ matrix.platform == 'windows' && '.exe' || '' }}
            dist/ssh-key-manager-macos.zip
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        shell: bash
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "current=$VER" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.version.outputs.current }}"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        shell: bash
        run: echo "${{ steps.bump.outputs.new }}" > VERSION

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new }} [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed, may already be pushed"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Prepare release assets (direct executable)
        shell: bash
        run: |
          VER="v${{ steps.bump.outputs.new }}"
          echo "=== release contents ==="
          find release/ -type f | head -20

          # Windows: 重命名为带版本号的文件名
          WIN_EXE="release/ssh-key-manager-windows/ssh-key-manager-windows.exe"
          if [ -f "$WIN_EXE" ]; then
            mv "$WIN_EXE" "release/ssh-key-manager-windows-${VER}.exe"
            echo "✅ Windows: release/ssh-key-manager-windows-${VER}.exe"
          else
            echo "❌ Windows exe not found"
            exit 1
          fi

          # Linux: 重命名为带版本号的文件名
          LIN_BIN="release/ssh-key-manager-linux/ssh-key-manager-linux"
          if [ -f "$LIN_BIN" ]; then
            chmod +x "$LIN_BIN"
            mv "$LIN_BIN" "release/ssh-key-manager-linux-${VER}"
            echo "✅ Linux: release/ssh-key-manager-linux-${VER}"
          else
            echo "❌ Linux binary not found"
            exit 1
          fi

          # macOS: 重命名 .app zip 为带版本号的文件名
          MAC_ZIP="release/ssh-key-manager-macos/ssh-key-manager-macos.zip"
          if [ -f "$MAC_ZIP" ]; then
            mv "$MAC_ZIP" "release/ssh-key-manager-macos-${VER}.zip"
            echo "✅ macOS: release/ssh-key-manager-macos-${VER}.zip"
          else
            echo "❌ macOS zip not found"
            exit 1
          fi

          echo "=== final release assets ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          body: |
            ## 🚀 SSH Key Manager v${{ steps.bump.outputs.new }}

            > 自动构建于 `${{ github.sha }}`

            ### 下载
            | 平台 | 文件 |
            |---|---|
            | 🐧 Linux | `ssh-key-manager-linux-v${{ steps.bump.outputs.new }}` |
            | 🪟 Windows | `ssh-key-manager-windows-v${{ steps.bump.outputs.new }}.exe` |
            | 🍎 macOS | `ssh-key-manager-macos-v${{ steps.bump.outputs.new }}.zip` |

            ### 使用
            ```bash
            # Windows: 双击 ssh-key-manager-windows-*.exe
            # Linux: chmod +x ssh-key-manager-* && ./ssh-key-manager-*
            # macOS: 解压 zip，将 SSH Key Manager.app 拖入应用程序文件夹，双击运行
            ```
          files: |
            release/ssh-key-manager-windows-v${{ steps.bump.outputs.new }}.exe
            release/ssh-key-manager-linux-v${{ steps.bump.outputs.new }}
            release/ssh-key-manager-macos-v${{ steps.bump.outputs.new }}.zip
          draft: false
          prerelease: false
