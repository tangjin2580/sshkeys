name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'
      - '**.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ssh-key-manager-linux
            separator: ":"
            icon: "asset/icon.png"
            exe_ext: ""
          - os: windows-latest
            artifact_name: ssh-key-manager-windows
            separator: ";"
            icon: "asset/icon.ico"
            exe_ext: ".exe"
          - os: macos-latest
            artifact_name: ssh-key-manager-macos
            separator: ":"
            icon: "asset/icon.icns"
            exe_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          SEP="${{ matrix.separator }}"
          ICON="${{ matrix.icon }}"
          # PyInstaller 命令：--windowed 替代 --console（无黑框）
          pyinstaller \
            --onedir \
            --windowed \
            --icon "$ICON" \
            --name "${{ matrix.artifact_name }}" \
            --add-data "templates${SEP}templates" \
            --add-data "static${SEP}static" \
            --add-data "VERSION${SEP}VERSION" \
            --hidden-import "pystray" \
            --hidden-import "pystray._unix" \
            --hidden-import "pystray._win32" \
            --hidden-import "PIL" \
            --hidden-import "PIL.Image" \
            --hidden-import "PIL.ImageDraw" \
            --hidden-import "PIL.ImageTk" \
            --hidden-import "PIL.ImageFont" \
            --hidden-import "PIL.ImageColor" \
            --hidden-import "tkinter" \
            --hidden-import "tkinter.ttk" \
            --hidden-import "waitress" \
            --hidden-import "flask" \
            --hidden-import "paramiko" \
            --hidden-import "cryptography" \
            --hidden-import "bcrypt" \
            --hidden-import "nacl" \
            --hidden-import "requests" \
            --collect-all "pystray" \
            --collect-all "Pillow" \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.exe_ext }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        shell: bash
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "current=$VER" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.version.outputs.current }}"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        shell: bash
        run: echo "${{ steps.bump.outputs.new }}" > VERSION

      - name: Commit version bump (skip CI)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new }} [skip ci]" || true
          git push || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (zip each platform)
        shell: bash
        run: |
          mkdir -p release
          # Linux: 压缩目录为 zip
          if [ -d "artifacts/ssh-key-manager-linux" ]; then
            cd artifacts/ssh-key-manager-linux
            zip -r ../../release/ssh-key-manager-linux-v${{ steps.bump.outputs.new }}.zip .
            cd ../../artifacts
          fi
          # Windows: 压缩目录为 zip
          if [ -d "artifacts/ssh-key-manager-windows" ]; then
            cd artifacts/ssh-key-manager-windows
            zip -r ../../release/ssh-key-manager-windows-v${{ steps.bump.outputs.new }}.zip .
            cd ../../artifacts
          fi
          # macOS: 压缩目录为 zip
          if [ -d "artifacts/ssh-key-manager-macos" ]; then
            cd artifacts/ssh-key-manager-macos
            zip -r ../../release/ssh-key-manager-macos-v${{ steps.bump.outputs.new }}.zip .
            cd ../../artifacts
          fi
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          body: |
            ## 🚀 SSH Key Manager v${{ steps.bump.outputs.new }}

            > 自动构建于 `${{ github.sha }}`

            ### 下载
            | 平台 | 文件 |
            |---|---|
            | 🐧 Linux | `ssh-key-manager-linux-v${{ steps.bump.outputs.new }}.zip` |
            | 🪟 Windows | `ssh-key-manager-windows-v${{ steps.bump.outputs.new }}.zip` |
            | 🍎 macOS | `ssh-key-manager-macos-v${{ steps.bump.outputs.new }}.zip` |

            ### 使用
            ```bash
            # 解压对应平台的 zip，运行可执行文件
            # Windows: 解压后运行 ssh-key-manager-windows.exe
            # Linux/macOS: chmod +x ssh-key-manager-* && ./ssh-key-manager-*
            ```
          files: release/*.zip
          draft: false
          prerelease: false
